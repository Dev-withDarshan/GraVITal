<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#110a24"/>
    </linearGradient>
    <linearGradient id="shapeGrad" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#47bfff"/>
      <stop offset="45%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#5a0edb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="256" y1="100" x2="420" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b87fff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="96"/>

  <!-- Glow blob behind shape -->
  <ellipse cx="256" cy="270" rx="160" ry="140" fill="#7e14ff" opacity="0.18" filter="url(#glow)"/>
  <ellipse cx="320" cy="200" rx="80" ry="60" fill="#47bfff" opacity="0.13" filter="url(#glow)"/>

  <!-- Stylized "G" letterform -->
  <!-- Arc of the G -->
  <path d="M 340 156
    A 110 110 0 1 0 366 290
    L 296 290
    L 296 240
    L 380 240
    L 380 316
    A 148 148 0 1 1 384 148
    Z"
    fill="url(#shapeGrad)"
    filter="url(#softGlow)"
    opacity="0.95"
  />

  <!-- Graduation cap hat (mortarboard) at top-right accent -->
  <polygon points="342,108 420,138 342,168 264,138" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="396" y="138" width="8" height="38" fill="url(#accentGrad)" rx="4" opacity="0.85"/>
  <circle cx="400" cy="183" r="10" fill="#47bfff" opacity="0.9"/>

  <!-- Upward trend line (grade going up) -->
  <polyline points="108,360 178,300 248,330 338,244" stroke="#47bfff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7" filter="url(#softGlow)"/>
  <polygon points="328,224 358,254 368,218" fill="#47bfff" opacity="0.9"/>
</svg>